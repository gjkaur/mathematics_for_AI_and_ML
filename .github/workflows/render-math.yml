name: Render math (README-practice)

concurrency:
  group: render-math-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "Day01/README-practice.source.md"
      - "tools/render-math.mjs"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Render math blocks to PNG
        run: npm run render:math

      - name: Commit generated README and images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: render math images for README-practice"
          file_pattern: "Day01/README-practice.md assets/math/**/*.png"
